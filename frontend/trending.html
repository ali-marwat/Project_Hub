<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending Projects - Project Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-top-bar">
      <div class="container nav-top-inner">
        <div class="nav-top-spacer"></div>
        <div class="nav-user-section">
          <img id="userAvatar" class="nav-avatar" src="" alt="" style="display:none;">
          <span id="userGreeting"></span>
          <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
      </div>
    </div>
    <div class="container nav-container">
      <div class="nav-left">
        <div class="logo">🎓 Project Hub<span class="breadcrumb"> / Trending</span></div>
      </div>
      <div class="nav-center">
        <div class="nav-links">
          <a href="index.html">All Projects</a>
          <a href="trending.html" class="active">Trending</a>
          <a href="dashboard.html">My Dashboard</a>
          <a href="bookmarks.html">Bookmarks</a>
          <a href="admin.html" id="adminLink" style="display: none;">Admin Panel</a>
        </div>
      </div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <main class="container">
    <div class="trending-header">
      <h1>🔥 Trending Projects</h1>
      <p class="subtitle">Most viewed in the last 7 days</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('trending')">🔥 Trending</button>
      <button class="tab-btn" onclick="showTab('popular')">⭐ Most Popular</button>
    </div>

    <div id="trendingTab" class="tab-content active">
      <div id="trendingProjects" class="projects-grid"></div>
    </div>

    <div id="popularTab" class="tab-content">
      <div id="popularProjects" class="projects-grid"></div>
    </div>

    <!-- Tag Cloud -->
    <div class="tag-cloud-section">
      <h2>🏷️ Popular Tags</h2>
      <div id="tagCloud" class="tag-cloud"></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/trending.js"></script>
  <script src="js/notifications.js"></script>
</body>

</html>
